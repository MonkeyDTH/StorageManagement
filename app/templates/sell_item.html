{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">卖出物品: {{ item.name }}</h1>
<form method="post">
    <div class="mb-3">
        <label class="form-label">卖出价格</label>
        <input type="number" step="0.01" class="form-control" name="sold_price" required>
    </div>
    <div class="mb-3">
        <label class="form-label">卖出日期</label>
        <input type="date" class="form-control" name="sold_date" required>
    </div>
    <button type="submit" class="btn btn-primary">确认卖出</button>
</form>
{% endblock %}
