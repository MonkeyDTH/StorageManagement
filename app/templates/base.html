<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>家庭物品库存</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #6563FF;
            --primary-light: #8785FF;
            --secondary: #FF6B6B;
            --dark: #1A1A1A;
            --dark-light: #2D2D2D;
            --light: #F8F8FB;
            --text: #E0E0E0;
            --text-muted: #9E9E9E;
            --border: #3D3D3D;
        }
        
        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding-top: 20px;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .container {
            background-color: var(--dark-light);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }
        
        .form-control, .form-select {
            background-color: var(--dark);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 10px 15px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            background-color: var(--dark);
            border-color: var(--primary);
            color: var(--text);
            box-shadow: 0 0 0 3px rgba(101, 99, 255, 0.2);
        }
        
        .form-label {
            color: var(--text);
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .btn {
            border-radius: 8px;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            box-shadow: 0 4px 10px rgba(101, 99, 255, 0.3);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(101, 99, 255, 0.4);
        }
        
        .btn-outline-primary {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        
        .btn-outline-primary:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--secondary), #FF9F9F);
            border: none;
        }
        
        .btn-danger:hover {
            background: linear-gradient(135deg, #FF9F9F, var(--secondary));
            transform: translateY(-2px);
        }
        
        .card {
            background-color: var(--dark-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .table {
            color: var(--text);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .table th {
            color: var(--text-muted);
            background-color: var(--dark);
            font-weight: 500;
            padding: 12px 15px;
        }
        
        .table td {
            padding: 12px 15px;
            vertical-align: middle;
        }
        
        .table td, .table th {
            border-color: var(--border);
        }
        
        .table tr:hover {
            background-color: rgba(101, 99, 255, 0.05);
        }
        
        /* 输入框占位符颜色 */
        ::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--dark);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
        
        /* 选择文本样式 */
        ::selection {
            background: var(--primary);
            color: white;
        }
        
        /* 徽章样式 */
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .badge.bg-secondary {
            background-color: var(--dark) !important;
            color: var(--text-muted);
        }
        
        /* 文本颜色 */
        .text-muted {
            color: var(--text-muted) !important;
        }
        
        /* 链接样式 */
        a {
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        a:hover {
            color: var(--primary-light);
            text-decoration: none;
        }
    </style>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/x-icon">
</head>
<body>
    <div class="container-fluid px-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
