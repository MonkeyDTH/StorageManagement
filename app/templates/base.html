<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}家庭库存管理{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 自定义CSS -->
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 自定义JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
    
    <!-- 在body结束标签前添加 -->
    {% if request.endpoint != 'add_item' and request.endpoint != 'edit_item' %}
    <div class="bottom-nav d-md-none">
        <a href="{{ url_for('index') }}" class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">
            <i class="bi bi-box"></i>
            <span>主页</span>
        </a>
        <a href="{{ url_for('stats') }}" class="nav-item {% if request.endpoint == 'stats' %}active{% endif %}">
            <i class="bi bi-bar-chart"></i>
            <span>统计</span>
        </a>
        <a href="#" class="nav-item">
            <i class="bi bi-search"></i>
            <span>发现</span>
        </a>
        <a href="#" class="nav-item">
            <i class="bi bi-person"></i>
            <span>我的</span>
        </a>
    </div>
    
    <!-- 添加按钮 -->
    <a href="{{ url_for('add_item') }}" class="add-button d-md-none">
        <i class="bi bi-plus"></i>
    </a>
    {% endif %}
</body>
</html>
