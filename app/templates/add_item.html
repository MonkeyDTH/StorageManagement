{% extends "base.html" %}

{% block content %}
<style>
    #imagePreview {
        max-width: 100%;
        max-height: 200px;
        display: none;
        margin-top: 10px;
    }
</style>

<h1 class="mb-4">添加新物品</h1>
<form method="post" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label">物品名称</label>
        <input type="text" class="form-control" name="name" required>
    </div>
    <div class="mb-3">
        <label class="form-label">类别</label>
        <input type="text" class="form-control" name="category" required>
    </div>
    <div class="mb-3">
        <label class="form-label">购买价格</label>
        <input type="number" step="0.01" class="form-control" name="price" required>
    </div>
    <div class="mb-3">
        <label class="form-label">数量</label>
        <input type="number" class="form-control" name="quantity" value="1" required>
    </div>
    <div class="mb-3">
        <label class="form-label">图片 (建议小于2MB)</label>
        <input type="file" class="form-control" name="image" accept="image/*" id="imageInput">
        <small class="text-muted">上传的图片将自动压缩至800x800像素</small>
        <img id="imagePreview" src="#" alt="图片预览">
    </div>
    <!-- 在购买日期字段后添加 -->
    <div class="mb-3">
        <label class="form-label">购买日期</label>
        <input type="date" class="form-control" name="purchase_date">
    </div>
    <div class="mb-3">
        <label class="form-label">买入渠道</label>
        <input type="text" class="form-control" name="purchase_channel">
    </div>
    <div class="mb-3">
        <label class="form-label">成色</label>
        <select class="form-select" name="condition">
            <option value="">请选择</option>
            <option value="全新">全新</option>
            <option value="无损有盒">无损有盒</option>
            <option value="无损无盒">无损无盒</option>
            <option value="有损">有损</option>
        </select>
    </div>
    <!-- 在成色字段后添加 -->
    <div class="mb-3">
        <label class="form-label">备注</label>
        <textarea class="form-control" name="remark" rows="3"></textarea>
    </div>
    
    <button type="submit" class="btn btn-primary">提交</button>
</form>

<script>
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('imagePreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });
</script>
{% endblock %}
