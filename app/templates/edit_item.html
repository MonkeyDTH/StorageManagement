{% extends "base.html" %}

{% block content %}
<div class="container">
    {% include '_item_form.html' %}
</div>
{% endblock %}

<script>
    // 计算总买入价格的函数
    function calculateTotalCost() {
        const price = parseFloat(document.getElementById('priceInput').value) || 0;
        const shippingFee = parseFloat(document.getElementById('shippingFeeInput').value) || 0;
        const total = price + shippingFee;
        document.getElementById('totalCostHint').textContent = 
            `总买入价格: ¥${total.toFixed(2)} (含运费 ¥${shippingFee.toFixed(2)})`;
    }

    // 添加事件监听器
    document.getElementById('priceInput').addEventListener('input', calculateTotalCost);
    document.getElementById('shippingFeeInput').addEventListener('input', calculateTotalCost);
</script>
