<div class="edit-form-container">
    <h1 class="mb-4" style="color: var(--text); font-weight: 600;">{{ title }}</h1>
    <form method="post" enctype="multipart/form-data">
        <!-- 第一行：物品名称和类别 -->
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">物品名称</label>
                <input type="text" class="form-control" name="name" value="{{ item.name if item else '' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">类别</label>
                <input type="text" class="form-control" name="category" value="{{ item.category if item else '' }}" required>
            </div>
        </div>

        <!-- 第二行：价格、运费和数量 -->
        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label">购买价格</label>
                <input type="number" step="0.01" class="form-control" name="price" value="{{ item.purchase_price if item else '' }}" required id="priceInput">
            </div>
            <div class="col-md-4 figure-field">
                <label class="form-label">运费</label>
                <input type="number" step="0.01" class="form-control" name="shipping_fee" value="{{ item.shipping_fee if item else '' }}" id="shippingFeeInput">
            </div>
            <div class="col-md-4 figure-field">
                <label class="form-label">数量</label>
                <input type="number" class="form-control" name="quantity" value="{{ item.quantity if item else 1 }}" min="1" required>
            </div>
        </div>
        <small class="text-muted mb-3 d-block figure-field" id="totalCostHint">总买入价格: ¥0.00 (含运费 ¥0.00)</small>

        <!-- 第三行：购买日期和到货日期 -->
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">购买日期</label>
                <input type="date" class="form-control" name="purchase_date" 
                       value="{% if item and item.purchase_date and not item.purchase_date is string %}{{ item.purchase_date.strftime('%Y-%m-%d') }}{% elif item and item.purchase_date %}{{ item.purchase_date }}{% endif %}">
            </div>
            <div class="col-md-6 figure-field">
                <label class="form-label">到货日期</label>
                <input type="date" class="form-control" name="arrival_date" 
                       value="{% if item and item.arrival_date and not item.arrival_date is string %}{{ item.arrival_date.strftime('%Y-%m-%d') }}{% elif item and item.arrival_date %}{{ item.arrival_date }}{% endif %}">
            </div>
        </div>

        <!-- 第四行：买入渠道和成色 -->
        <div class="row mb-3 figure-field">
            <div class="col-md-6">
                <label class="form-label">买入渠道</label>
                <input type="text" class="form-control" name="purchase_channel" value="{{ item.purchase_channel if item else '' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">成色</label>
                <select class="form-select" name="condition">
                    <option value="">请选择</option>
                    <option value="全新" {% if item and item.condition == '全新' %}selected{% endif %}>全新</option>
                    <option value="无损有盒" {% if item and item.condition == '无损有盒' %}selected{% endif %}>无损有盒</option>
                    <option value="无损无盒" {% if item and item.condition == '无损无盒' %}selected{% endif %}>无损无盒</option>
                    <option value="有损" {% if item and item.condition == '有损' %}selected{% endif %}>有损</option>
                </select>
            </div>
        </div>

        <div class="mb-3 figure-field">
            <label class="form-label">备注</label>
            <textarea class="form-control" name="remark" rows="3">{{ item.remark if item else '' }}</textarea>
        </div>

        <!-- 上传图片区域移到表单底部 -->
        <div class="mb-3">
            <label class="form-label">图片 (建议小于2MB)</label>
            <input type="file" class="form-control" name="image" accept="image/*" id="imageInput">
            <input type="hidden" name="rotation_angle" id="rotationAngle" value="0">
            <small class="text-muted">上传的图片将自动压缩至800x800像素</small>
            {% if item and item.image %}
                <div class="mt-3 text-center">
                    <img src="{{ url_for('static', filename='uploads/' + item.image) }}" 
                         class="img-fluid rounded mb-3 preview-image" 
                         style="max-height: 400px; cursor: zoom-in;"
                         data-original-src="{{ url_for('static', filename='uploads/' + item.image) }}">
                </div>
            {% endif %}
            <img id="imagePreview" src="#" alt="图片预览" class="img-fluid rounded mt-2" style="display: none; max-height: 400px;">
        </div>

        <div class="d-flex justify-content-between mt-4">
            <button type="submit" class="btn btn-primary">提交</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">取消</a>
        </div>
    </form>
</div>

<script>
    // 根据物品类型切换显示字段
    function toggleItemFields() {
        const itemType = document.getElementById('item_type')?.value || 'figure';
        const figureFields = document.querySelectorAll('.figure-field');
        
        if (itemType === 'clothing') {
            // 隐藏手办特有字段
            figureFields.forEach(field => {
                field.style.display = 'none';
            });
        } else {
            // 显示手办特有字段
            figureFields.forEach(field => {
                field.style.display = 'block';
            });
        }
    }
    
    // 页面加载时执行一次
    document.addEventListener('DOMContentLoaded', function() {
        // 如果存在物品类型选择器，则初始化字段显示
        if (document.getElementById('item_type')) {
            toggleItemFields();
        }
    });
    
    let currentRotation = 0;
    
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.rotate-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const degrees = parseInt(this.getAttribute('data-degrees'));
                const imgContainer = this.closest('.mt-3');
                const img = imgContainer.querySelector('.preview-image');
                
                currentRotation += degrees;
                document.getElementById('rotationAngle').value = currentRotation;
                
                img.style.transform = `rotate(${currentRotation}deg)`;
                
                const preview = document.getElementById('imagePreview');
                if(preview.style.display !== 'none') {
                    preview.style.transform = `rotate(${currentRotation}deg)`;
                }
            });
        });
    });

    // 图片预览功能
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('imagePreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    // 图片点击放大功能
    document.querySelectorAll('.preview-image').forEach(img => {
        img.addEventListener('click', function() {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.backgroundColor = 'rgba(0,0,0,0.8)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = '9999';
            modal.style.cursor = 'zoom-out';
            
            const fullImg = document.createElement('img');
            fullImg.src = this.getAttribute('data-original-src');
            fullImg.style.maxHeight = '90vh';
            fullImg.style.maxWidth = '90vw';
            fullImg.style.transform = this.style.transform;
            
            modal.appendChild(fullImg);
            modal.addEventListener('click', () => document.body.removeChild(modal));
            document.body.appendChild(modal);
        });
    });
</script>
